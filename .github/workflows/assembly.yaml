name: isoextractor test

# auto-run if there are any changes to the source files
on:
  push:
    paths:
      - .github/workflows/assembly.yaml
      - src/*
  pull_request:
     paths:
      - .github/workflows/assembly.yaml
      - src/*

env:
  DOTNET_DOCKER: mcr.microsoft.com/dotnet/sdk:8.0
  EXAMPLE_RAW: test.raw
  EXAMPLE_SPECTRA: all
jobs:
  build:
    name: Build Assembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull image
        run: docker pull $DOTNET_DOCKER
      - name: Build
        run: docker run --rm -v $PWD:/app -w /app $DOTNET_DOCKER /app/build.sh project=/app output=/app/out
      - name: Publish results
        uses: actions/upload-artifact@v4
        with:
          name: isoextract
          path: out
          retention-days: 1
  verify-linux:
    name: Verify on Linux
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: isoextract
      - name: List result
        run: tree
      - name: Make binary executable
        run: chmod +x ./isoextract-linux-x64
  verify-windows:
    name: Verify on Windows
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: isoextract
      - name: List result
        run: dir
  verify-macos:
    name: Verify on MacOS
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Download results
        uses: actions/download-artifact@v4
        with:
          name: isoextract
      - name: List result
        run: ls -l
      - name: Make binary executable
        run: chmod +x ./isoextract-osx-x64
  
  # not uploading the artifacts for releases since not all new releases require new executables